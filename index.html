<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Insight Explorer</title>
    <style>
        /* Embedding your full CSS here so Render handles it perfectly */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffe5ec; background-image: radial-gradient(#ffb3c6 10%, transparent 10%), radial-gradient(#ffb3c6 10%, transparent 10%); background-size: 40px 40px; background-position: 0 0, 20px 20px; color: #4a4a4a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px; }
        .main-wrapper { width: 100%; max-width: 900px; background-color: #ffffff; border: 3px solid #ffb3c6; border-radius: 20px; padding: 35px; box-shadow: 0 8px 20px rgba(255, 179, 198, 0.4); }
        .main-header { text-align: center; margin-bottom: 25px; }
        .main-header h1 { color: #ff758f; font-size: 2.5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background-color: #fff0f3; border: 2px dashed #ffb3c6; border-radius: 15px; padding: 15px; text-align: center; }
        .stat-card h3 { color: #ff758f; font-size: 0.95rem; text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: #ff4d6d; }
        .panel-section { background-color: #fff0f3; border: 2px solid #ffb3c6; border-radius: 15px; padding: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex-grow: 1; padding: 14px; border: 2px solid #ffb3c6; border-radius: 10px; }
        button { padding: 14px 28px; background-color: #ff758f; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .display-box { background-color: #ffffff; border: 2px solid #ffb3c6; border-radius: 10px; padding: 15px; min-height: 250px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <header class="main-header">
            <h1>🚀 Startup Insight Explorer</h1>
        </header>
        <div class="stats-row">
            <div class="stat-card"><h3>Core Startups</h3><p>3</p></div>
            <div class="stat-card"><h3>Total Funding</h3><p>$14.2M</p></div>
            <div class="stat-card"><h3>Status</h3><p>Online</p></div>
        </div>
        <div class="panel-section">
            <h2>💬 AI Startup Assistant</h2>
            <div class="input-group">
                <input type="text" id="question" placeholder="Ask about any startup...">
                <button id="askBtn">Ask AI</button>
            </div>
            <div id="report" class="display-box">AI response will appear here...</div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
