<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup Insight Explorer</title>
    <style>
        body { background: #ffe5ec; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 15px; border: 2px solid #ffb3c6; }
        input { width: 75%; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px; background: #ff758f; color: white; border: none; }
        #report { margin-top: 15px; padding: 10px; border: 1px dashed #ff758f; min-height: 50px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Startup Explorer</h1>
        <input type="text" id="q" placeholder="Ask something...">
        <button onclick="ask()">Ask</button>
        <div id="report">Response will appear here...</div>
    </div>
    <script>
        async function ask() {
            const q = document.getElementById("q").value;
            const r = document.getElementById("report");
            r.innerText = "Thinking...";
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                r.innerText = await res.text();
            } catch(e) { r.innerText = "Error: " + e; }
        }
    </script>
</body>
</html>
