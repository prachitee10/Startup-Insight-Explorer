<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Funding Tracker & Insight Explorer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h1>Startup Funding Tracker & Insight Explorer</h1>
        
        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <div class="message system-message">Welcome! Ask me anything about startup funding or trends.</div>
            </div>
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask about startups, funding, trends...">
                <button id="sendBtn">Ask AI</button>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
