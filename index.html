<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Insight Explorer</title>
    <style>
        /* CSS ka code jo tumne diya tha, woh yahan paste kar dena */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #ffe5ec; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 30px; }
        .main-wrapper { width: 100%; max-width: 900px; background: #ffffff; border: 3px solid #ffb3c6; border-radius: 20px; padding: 35px; }
        .stat-card { background: #fff0f3; border: 2px dashed #ffb3c6; padding: 15px; text-align: center; border-radius: 15px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        input[type="text"] { flex-grow: 1; padding: 14px; border: 2px solid #ffb3c6; border-radius: 10px; }
        button { padding: 14px 28px; background: #ff758f; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <header><h1>🚀 Startup Insight Explorer</h1></header>
        <div class="stats-row">
            <div class="stat-card"><h3>Startups</h3><p>3</p></div>
            <div class="stat-card"><h3>Funding</h3><p>$14.2M</p></div>
            <div class="stat-card"><h3>Status</h3><p>Online</p></div>
        </div>
        <input type="text" id="question" placeholder="Ask about any startup...">
        <button id="askBtn">Ask AI</button>
        <div id="report" style="margin-top:20px;"></div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
