<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Insight Explorer</title>
    <style>
        /* Pink Layout */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: #ffe5ec; 
            background-image: radial-gradient(#ffb3c6 10%, transparent 10%); 
            background-size: 40px 40px; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 30px; 
        }
        .main-wrapper { 
            width: 100%; 
            max-width: 900px; 
            background: #ffffff; 
            border: 3px solid #ffb3c6; 
            border-radius: 20px; 
            padding: 35px; 
            box-shadow: 0 8px 20px rgba(255, 179, 198, 0.4); 
        }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #fff0f3; border: 2px dashed #ffb3c6; padding: 15px; text-align: center; border-radius: 15px; }
        .display-box { background: #ffffff; border: 2px solid #ffb3c6; border-radius: 10px; padding: 15px; min-height: 200px; margin-top: 20px; color: #4a4a4a; line-height: 1.6; }
        input { flex-grow: 1; padding: 14px; border: 2px solid #ffb3c6; border-radius: 10px; outline: none; }
        button { padding: 14px 28px; background: #ff758f; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff4d6d; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1>🚀 Startup Insight Explorer</h1>
        <div class="stats-row">
            <div class="stat-card"><h3>Startups</h3><p>3</p></div>
            <div class="stat-card"><h3>Funding</h3><p>$14.2M</p></div>
            <div class="stat-card"><h3>Status</h3><p>Online</p></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="question" placeholder="Ask about any startup...">
            <button type="button" id="askBtn">Ask AI</button>
        </div>
        <div id="report" class="display-box">AI response will appear here...</div>
    </div>

    <script>
        document.getElementById("askBtn").addEventListener("click", function() {
            const q = document.getElementById("question").value;
            const r = document.getElementById("report");
            
            if (!q) {
                alert("Please type a question!");
                return;
            }

            r.innerText = "Analyzing market data...";

            // This simulates an AI "thinking" for 1 second before showing an answer
            setTimeout(() => {
                const responses = [
                    "Based on current trends, funding is heavily shifting toward vertical AI solutions that solve specific industrial bottlenecks in logistics.",
                    "Market analysis indicates that early-stage startups are prioritizing 'AI Agents' over simple chatbots to drive higher ROI for their clients.",
                    "Current data suggests that infrastructure costs are a primary concern, pushing new startups toward 'Edge AI' to reduce cloud expenses.",
                    "The startup ecosystem is favoring 'practical AI' applications in healthcare and finance over speculative tech, leading to higher investor confidence."
                ];
                
                // Picks a random response from the list above
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                
                r.innerHTML = "<strong>You asked:</strong> " + q + "<br><br><strong>AI Insight:</strong> " + randomResponse;
            }, 1000); 
        });
    </script>
</body>
</html>
